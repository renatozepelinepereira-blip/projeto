<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferência - Eskimó</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍨</text></svg>">
    <link rel="stylesheet" href="./css/loja.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
</head>
<body>
    <div class="sidebar-admin">
        <div class="sidebar-header"><span class="sidebar-logo-icon">🍨</span><h2 class="sidebar-title">Eskimó</h2></div>
        <div class="nav-links">
            <button onclick="window.location.href='loja.html'"><i>🛒</i> <span>Nova Venda</span></button>
            <button class="active"><i>🔄</i> <span>Transferência</span></button>
            <button onclick="window.location.href='historico.html'"><i>📜</i> <span>Histórico</span></button>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="margin-top:auto; color:#ef4444;"><i>🚪</i> <span>Sair</span></button>
        </div>
    </div>

    <div class="main-content">
        <div class="section-title">
            <span>Transferência de Estoque</span>
            <span class="store-badge" id="txtLoja" style="background: #dbeafe; color: #1e3a8a;">Matriz / Central</span>
        </div>
        
        <div class="card-panel client-box" style="grid-template-columns: 2fr 1fr; border-left-color: #3b82f6;">
            <div><label>Filial de Destino</label><input type="text" id="cliRazao" list="listaFiliais" placeholder="Ex: Filial 03 - Canoas"></div>
            <div><label>CNPJ Destino</label><input type="text" id="cliCnpj" readonly style="background:#e2e8f0; cursor:not-allowed;"></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btnTabSorvete" onclick="window.mudarAba('sorvete')">Sorvetes</button>
            <button class="tab-btn" id="btnTabSeco" onclick="window.mudarAba('seco')">Secos</button>
        </div>

        <div class="table-container">
            <div id="content_sorvete" class="tab-content active">
                <table id="tbl_sorvete">
                    <thead style="position: sticky; top: 0; z-index: 1;"><tr><th>Foto</th><th>Cód</th><th>Descrição</th><th>Engr.</th><th>Caixas</th><th>Unid.</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="content_seco" class="tab-content">
                <table id="tbl_seco"><thead style="position: sticky; top: 0; z-index: 1;"><tr><th>Foto</th><th>Cód</th><th>Descrição</th><th>Engr.</th><th>Caixas</th><th>Unid.</th></tr></thead><tbody></tbody></table>
            </div>
        </div>

        <div class="resumo-box" style="border-color: #3b82f6;">
            <div class="resumo-grid" style="grid-template-columns: 1fr;">
                <button onclick="window.gerarExcelTransferencia()" class="btn-primario" style="background: #3b82f6; width: 100%; justify-content: center;">
                    <span style="font-size: 20px; margin-right: 10px;">⬇️</span> GERAR TRANSFERÊNCIA EXCEL
                </button>
            </div>
        </div>
    </div>

    <datalist id="listaFiliais"></datalist>
    <script type="module" src="./js/transferencia.js"></script>
</body>
</html>
