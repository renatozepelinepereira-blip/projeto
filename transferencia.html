<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Transferência - Eskimó</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; border-top: 5px solid #0056b3; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        /* MENU SANDUÍCHE E HEADER (Azul para diferenciar visualmente da venda, se quiser) */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0056b3; padding-bottom: 15px; margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: #0056b3; }
        h1 { color: #0056b3; }
        
        /* SIDEBAR (GAVETA) */
        .sidebar { position: fixed; left: -250px; top: 0; width: 250px; height: 100%; background: #fff; box-shadow: 2px 0 5px rgba(0,0,0,0.2); transition: 0.3s; z-index: 1000; display: flex; flex-direction: column; padding-top: 20px; }
        .sidebar.open { left: 0; }
        .sidebar h2 { text-align: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: #e3000f; }
        .sidebar a { padding: 15px 20px; text-decoration: none; color: #333; font-weight: bold; border-bottom: 1px solid #eee; display: block; }
        .sidebar a:hover { background: #f4f4f4; color: #0056b3; }
        .sidebar a.active { background: #0056b3; color: white; }
        .sidebar .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; background: none; border: none; cursor: pointer; color: #666; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .overlay.show { display: block; }

        .blank-slate { text-align: center; padding: 100px 20px; color: #666; }
    </style>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <button class="close-btn" onclick="window.toggleMenu()">×</button>
        <h2>Menu Eskimó</h2>
        <a href="loja.html">🛒 Venda</a>
        <a href="transferencia.html" class="active">🔄 Transferência</a>
        <a href="#" onclick="localStorage.clear(); window.location.href='index.html'" style="color: #dc3545; margin-top: auto; border-top: 1px solid #eee;">🚪 Sair</a>
    </div>
    <div id="overlay" class="overlay" onclick="window.toggleMenu()"></div>

    <div class="container">
        <header>
            <div class="header-left">
                <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
                <h1>Filial: <span id="txtLoja"></span> - <span style="color:#444; font-size:20px;">Módulo Transferência</span></h1>
            </div>
        </header>

        <div class="blank-slate">
            <h2>Módulo de Transferência</h2>
            <p>Este ambiente está preparado para receber as novas regras de transferência entre filiais.</p>
        </div>
    </div>

    <script type="module">
        const userId = localStorage.getItem('user');
        if(!userId) window.location.href = 'index.html';
        document.getElementById('txtLoja').innerText = localStorage.getItem('nome') || userId;

        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        };
    </script>
</body>
</html>
