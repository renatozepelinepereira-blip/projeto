<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Transferência - Eskimó Sorvetes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍨</text></svg>">
    <link rel="stylesheet" href="./css/transferencia.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
</head>
<body>
    <div class="sidebar-admin">
        <div class="sidebar-header"><span class="sidebar-logo-icon">🍨</span><h2 class="sidebar-title">Eskimó</h2></div>
        <div class="nav-links">
            <button onclick="window.location.href='loja.html'"><i>🛒</i> <span>Vendas</span></button>
            <button class="active"><i>🔄</i> <span>Transferência</span></button>
            <button onclick="window.location.href='historico.html'"><i>📜</i> <span>Histórico</span></button>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="margin-top:auto; color:#ff7675;"><i>🚪</i> <span>Sair</span></button>
        </div>
    </div>

    <div class="main-content">
        <header class="section-title">Transferência entre Filiais</header>
        
        <div class="card-panel client-box">
            <div><label>Filial de Destino</label><input type="text" id="cliRazao" list="listaFiliais" placeholder="Selecione a filial"></div>
            <div><label>CNPJ Destino</label><input type="text" id="cliCnpj" readonly style="background:#f0f0f0"></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="mudarAba('sorvete')">Sorvetes</button>
            <button class="tab-btn" onclick="mudarAba('seco')">Secos</button>
        </div>

        <div id="content_sorvete" class="tab-content active">
            <table id="tbl_sorvete"><thead><tr><th>Foto</th><th>Cód</th><th>Descrição</th><th>Engr.</th><th>Caixas</th><th>Unid.</th></tr></thead><tbody></tbody></table>
        </div>
        <div id="content_seco" class="tab-content" style="display:none;">
            <table id="tbl_seco"><thead><tr><th>Foto</th><th>Cód</th><th>Descrição</th><th>Engr.</th><th>Caixas</th><th>Unid.</th></tr></thead><tbody></tbody></table>
        </div>

        <div class="card-panel resumo-box">
            <button onclick="window.gerarExcelTransferencia()" class="btn-primario" style="width:100%; height: 60px; font-size: 20px;">⬇️ GERAR TRANSFERÊNCIA</button>
        </div>
    </div>

    <datalist id="listaFiliais"></datalist>
    <script type="module" src="./js/transferencia.js"></script>
</body>
</html>
