<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferência - Eskimó</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍨</text></svg>">
    <link rel="stylesheet" href="./css/loja.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
</head>
<body>

    <div class="top-header">
        <div class="top-header-left">
            <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
            <div class="logo-container">🍨 Eskimó</div>
        </div>
        <div class="store-badge" id="txtLoja">Carregando...</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-head">
            <h2>🍨 Eskimó</h2>
            <button class="close-btn" onclick="window.toggleMenu()">×</button>
        </div>
        <div class="sidebar-links">
            <button id="btnNavVenda" onclick="window.location.href='loja.html'"><i>🛒</i> Nova Venda</button>
            <button class="active"><i>🔄</i> Transferência</button>
            <button onclick="window.location.href='historico.html'"><i>📜</i> Histórico</button>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="margin-top:auto; color:#ef4444;"><i>🚪</i> Sair</button>
        </div>
    </div>
    <div class="overlay" onclick="window.toggleMenu()"></div>

    <div class="container" style="padding-bottom: 60px;">
        <h2 class="section-title">Transferência de Estoque</h2>

        <div class="card-panel client-box" style="grid-template-columns: 2fr 1fr; border-left-color: #3b82f6;">
            <div><label>Buscar Filial (Nome, CNPJ ou Nº)</label><input type="text" id="cliRazao" list="listaFiliais" placeholder="Ex: 003, Canoas ou CNPJ"></div>
            <div><label>CNPJ Destino</label><input type="text" id="cliCnpj" readonly style="background:#e2e8f0; cursor:not-allowed;"></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btnTabSorvete" onclick="window.mudarAba('sorvete')">Sorvetes</button>
            <button class="tab-btn" id="btnTabSeco" onclick="window.mudarAba('seco')">Secos</button>
        </div>

        <div class="table-container">
            <div id="content_sorvete" class="tab-content active">
                <table id="tbl_sorvete">
                    <thead style="position: sticky; top: 0; z-index: 1;"><tr><th style="width:60px;">Foto</th><th>Cód</th><th>Descrição</th><th>Engr.</th><th>Caixas</th><th>Unid.</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="content_seco" class="tab-content">
                <table id="tbl_seco"><thead style="position: sticky; top: 0; z-index: 1;"><tr><th style="width:60px;">Foto</th><th>Cód</th><th>Descrição</th><th>Engr.</th><th>Caixas</th><th>Unid.</th></tr></thead><tbody></tbody></table>
            </div>
        </div>

        <div class="resumo-box" style="border: none; border-top: 4px solid #3b82f6; padding: 10px 20px; bottom: 10px;">
            <div class="resumo-grid" style="grid-template-columns: auto auto auto; justify-content: end; gap: 20px; text-align: right;">
                <div class="resumo-info">
                    <b style="font-size: 11px;">Qtd (Un)</b>
                    <span id="qtdTotal" style="color: #475569; font-size: 20px;">0</span>
                </div>
                <div class="resumo-info">
                    <b style="font-size: 11px;">Total (TF)</b>
                    <span id="valComDesc" style="color: #3b82f6; font-size: 20px;">R$ 0,00</span>
                </div>
                <button onclick="window.gerarExcelTransferencia()" class="btn-primario" style="background: #3b82f6; padding: 10px 20px; font-size: 14px; margin-left: 10px;">
                    <span style="font-size: 18px; margin-right: 5px;">⬇️</span> Gerar
                </button>
            </div>
        </div>
    </div>

    <datalist id="listaFiliais"></datalist>
    <script type="module" src="./js/transferencia.js"></script>
</body>
</html>
