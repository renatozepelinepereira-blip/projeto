<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Histórico - Eskimó Sorvetes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍨</text></svg>">
    <link rel="stylesheet" href="./css/loja.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
</head>
<body>
    <div class="sidebar-admin">
        <div class="sidebar-header"><span class="sidebar-logo-icon">🍨</span><h2 class="sidebar-title">Eskimó</h2></div>
        <div class="nav-links">
            <button onclick="window.location.href='loja.html'"><i>🛒</i> <span>Vendas</span></button>
            <button onclick="window.location.href='transferencia.html'"><i>🔄</i> <span>Transferência</span></button>
            <button class="active"><i>📜</i> <span>Histórico</span></button>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="margin-top:auto; color:#ff7675;"><i>🚪</i> <span>Sair</span></button>
        </div>
    </div>

    <div class="main-content">
        <h2 class="section-title">Seu Histórico de Pedidos</h2>
        <div class="card-panel">
            <input type="text" id="filtroHist" placeholder="🔍 Pesquisar por ação ou data..." oninput="window.filtrar()">
            <table style="margin-top:15px;">
                <thead><tr><th>Data</th><th>Ação</th><th>Destino</th><th>Baixar</th></tr></thead>
                <tbody id="corpoHist"></tbody>
            </table>
        </div>
    </div>
    <script type="module" src="./js/historico.js"></script>
</body>
</html>
