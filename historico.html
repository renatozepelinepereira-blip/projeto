<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Eskimó</title>
    <link rel="stylesheet" href="./css/app.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <button class="close-btn" onclick="window.toggleMenu()">×</button>
        <h2>Menu Eskimó</h2>
        <a href="loja.html" id="linkVendaSidebar">🛒 Venda</a>
        <a href="transferencia.html">🔄 Transferência</a>
        <a href="historico.html" class="active">📜 Histórico</a>
        <a href="#" onclick="localStorage.clear(); window.location.href='index.html'" style="color: #dc3545; margin-top: auto; border-top: 1px solid #eee;">🚪 Sair</a>
    </div>
    <div id="overlay" class="overlay" onclick="window.toggleMenu()"></div>

    <div class="container">
        <header>
            <div class="header-left">
                <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
                <h1>Histórico: <span id="txtLoja"></span></h1>
            </div>
        </header>

        <input type="text" id="pesquisaLogLoja" placeholder="🔍 Pesquisar por destino ou data..." style="width:100%; padding:14px; margin-bottom:20px; border-radius:8px; border:1px solid #dcdcdc; outline:none; font-size: 15px;">
        
        <div style="max-height: 600px; overflow-y: auto; border-radius: 8px; border: 1px solid #eee;">
            <table id="tabelaHistoricoLoja">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Ação</th>
                        <th>Destino</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" style="text-align:center;">A carregar histórico...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalDetalhesLog">
        <div class="modal-content" style="width: 700px; max-width: 95%;">
            <h2 style="color: #e3000f; margin-bottom:15px; font-size: 22px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Detalhes da Planilha</h2>
            <div id="conteudoDetalhesLog" style="background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; overflow-x: auto; margin-bottom: 15px;">
                </div>
            <button id="btnRegerarPlanilhaModal" class="btn-sucesso" style="width: 100%; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;"></button>
            <button onclick="window.fecharModal('modalDetalhesLog')" style="background:#6c757d; color: white; margin-top:10px; width: 100%; padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 15px;">Fechar</button>
        </div>
    </div>

    <script type="module" src="./js/historico.js"></script>
</body>
</html>
