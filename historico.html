<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Eskimó</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍨</text></svg>">
    <link rel="stylesheet" href="./css/loja.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
</head>
<body>

    <div class="top-header">
        <div class="top-header-left">
            <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
            <div class="logo-container">🍨 Eskimó</div>
        </div>
        <div class="store-badge" id="txtLoja">Carregando...</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-head">
            <h2>🍨 Eskimó</h2>
            <button class="close-btn" onclick="window.toggleMenu()">×</button>
        </div>
        <div class="sidebar-links">
            <button id="btnNavVenda" onclick="window.location.href='loja.html'"><i>🛒</i> Nova Venda</button>
            <button onclick="window.location.href='transferencia.html'"><i>🔄</i> Transferência</button>
            <button class="active"><i>📜</i> Histórico</button>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="margin-top:auto; color:#ef4444;"><i>🚪</i> Sair</button>
        </div>
    </div>
    <div class="overlay" onclick="window.toggleMenu()"></div>

    <div class="container">
        <h2 class="section-title">Seu Histórico de Pedidos e Transferências</h2>
        
        <div class="card-panel">
            <input type="text" id="filtroHist" placeholder="🔍 Pesquisar por data, ação ou destino..." oninput="window.filtrar()" style="margin-bottom: 20px; padding: 14px; border-radius: 10px; border: 1px solid var(--border); width: 100%; background: #f8fafc; font-size: 15px;">
            
            <div class="table-container">
                <table>
                    <thead style="background: #f8fafc;">
                        <tr><th>Data do Registro</th><th>Ação Realizada</th><th>Cliente / Filial Destino</th><th>Download</th></tr>
                    </thead>
                    <tbody id="corpoHist">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="./js/historico.js"></script>
</body>
</html>
