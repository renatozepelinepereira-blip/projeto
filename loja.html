<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Venda - Eskimó</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍨</text></svg>">
    <link rel="stylesheet" href="./css/loja.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" defer></script>
</head>
<body>
    <div class="top-header">
        <div class="top-header-left">
            <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
            <div class="logo-container">🍨 Eskimó</div>
        </div>
        <div class="store-badge" id="txtLoja">Carregando...</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-head">
            <h2>🍨 Eskimó</h2>
            <button class="close-btn" onclick="window.toggleMenu()">×</button>
        </div>
        <div class="sidebar-links">
            <button class="active"><i>🛒</i> Nova Venda</button>
            <button onclick="window.location.href='transferencia.html'"><i>🔄</i> Transferência</button>
            <button onclick="window.location.href='historico.html'"><i>📜</i> Histórico</button>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="margin-top:auto; color:#ef4444;"><i>🚪</i> Sair</button>
        </div>
    </div>
    <div class="overlay" onclick="window.toggleMenu()"></div>

    <div class="container">
        <h2 class="section-title">Portal de Vendas</h2>

        <div class="card-panel client-box">
            <div><label>Razão Social do Cliente</label><input type="text" id="cliRazao" list="listaNomesClientes" placeholder="Ex: Supermercado XYZ"></div>
            <div><label>CNPJ</label><input type="text" id="cliCnpj" placeholder="00.000.000/0000-00"></div>
            <div><label>Pagamento</label><select id="cliFormaPagamento"><option>A vista</option><option>Boleto</option><option>Cartão</option></select></div>
            <div><label>Prazo</label><input type="text" id="cliPrazo" placeholder="Ex: 7 dias" disabled style="background:#e2e8f0; cursor:not-allowed;"></div>
        </div>

        <div class="tabs" id="containerTabsLoja">
            </div>

        <div class="table-container" id="containerTabelasLoja">
             </div>

        <div class="resumo-box">
            <div class="resumo-grid">
                <div class="resumo-info">
                    <b>Qtd (Un)</b>
                    <span id="qtdTotal" style="color: #475569;">0</span>
                </div>
                
                <div class="resumo-info" id="divResumoBruto" style="display: none;">
                    <b>Valor Bruto</b>
                    <span id="valBruto" style="color: #94a3b8; text-decoration: line-through; font-size: 14px;">R$ 0,00</span>
                </div>
                <div class="resumo-info" id="divResumoDesconto" style="display: none;">
                    <b>Desconto Reais</b>
                    <span id="valDesconto" style="color: #ef4444; font-size: 15px;">- R$ 0,00</span>
                </div>
                
                <div class="resumo-info">
                    <b>Total Líquido</b>
                    <span id="valComDesc">R$ 0,00</span>
                </div>
                <button onclick="window.gerarExcelPedido()" class="btn-sucesso">
                    <span style="font-size: 14px;">⬇️</span> Gerar Pedido
                </button>
            </div>
        </div>
    </div>

    <datalist id="listaNomesClientes"></datalist>
    <div class="modal-overlay" id="modalForcarSenha" style="display:none; background: rgba(15, 23, 42, 0.98); z-index: 99999999;">
        <div class="modal-content" style="text-align: center; padding: 40px; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);">
            <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
            <h2 style="color: var(--primary); margin-bottom: 10px;">Atualização de Segurança</h2>
            <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Por motivos de segurança, você precisa definir uma nova senha para sua loja antes de fazer qualquer pedido.</p>
            <input type="password" id="novaSenhaForcada" placeholder="Digite sua nova senha secreta" style="width: 100%; text-align: center; font-size: 18px; margin-bottom: 20px; padding: 15px; border-radius: 8px;">
            <button onclick="window.salvarNovaSenhaObrigatoria()" class="btn-primario" style="width: 100%; font-size: 16px; padding: 15px;">💾 Salvar Senha e Acessar</button>
        </div>
    </div>
    <script type="module" src="./js/loja.js"></script>
</body>
</html>
