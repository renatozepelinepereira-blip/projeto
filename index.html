<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eskimó</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; border-top: 5px solid #e3000f; }
        h1 { color: #e3000f; text-align: center; margin-bottom: 20px; font-size: 24px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { background: #e3000f; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #b3000c; }
        #msg { color: red; text-align: center; margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <form id="loginForm" class="card">
        <h1>Portal Eskimó</h1>
        <input type="text" id="user" placeholder="Usuário" required>
        <input type="password" id="pass" placeholder="Senha" required>
        <button type="submit" id="btnLogin">Entrar</button>
        <p id="msg"></p>
    </form>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        // Suas chaves de conexão diretas com o Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBA9gyn1dWpSoTD8VORiiPU4hUIEVG7DU8",
            authDomain: "sistema-pedidos-3f2c2.firebaseapp.com",
            projectId: "sistema-pedidos-3f2c2",
            storageBucket: "sistema-pedidos-3f2c2.firebasestorage.app",
            messagingSenderId: "669786014126",
            appId: "1:669786014126:web:d0da498633a145d56a883f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault(); // Impede a página de piscar à toa
            
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btnLogin');

            // Feedback visual enquanto carrega
            btn.innerText = "Aguarde...";
            btn.disabled = true;
            msg.style.display = 'none';

            try {
                // Cria o admin padrão caso seja o primeiro acesso na base nova
                if(u === 'admin' && p === 'admin') {
                    await setDoc(doc(db, "usuarios", "admin"), { senha: "admin", nomeLoja: "Matriz", tipo: "admin" }, { merge: true });
                }

                const snap = await getDoc(doc(db, "usuarios", u));
                
                if(snap.exists() && snap.data().senha === p) {
                    
                    // --- AQUI ESTÁ A CORREÇÃO PRINCIPAL ---
                    // Salvamos todas as credenciais na memória do navegador
                    localStorage.setItem('user', u);
                    localStorage.setItem('nome', snap.data().nomeLoja);
                    localStorage.setItem('tipo', snap.data().tipo); // Esta é a chave que libera a tela admin
                    
                    // Redireciona para a tela certa
                    window.location.href = snap.data().tipo === "admin" ? "admin.html" : "loja.html";
                } else {
                    msg.style.display = 'block';
                    msg.innerText = "Usuário ou senha incorretos.";
                    btn.innerText = "Entrar";
                    btn.disabled = false;
                }
            } catch (error) {
                msg.style.display = 'block';
                msg.innerText = "Erro de conexão: " + error.code;
                btn.innerText = "Entrar";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
