<script type="module">
    // ... (restante do código de configuração do Firebase) ...
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;

        try {
            const snap = await getDoc(doc(db, "usuarios", u));
            if(snap.exists() && snap.data().senha === p) {
                // GRAVAÇÃO NO NAVEGADOR
                localStorage.setItem('user', u);
                localStorage.setItem('tipo', snap.data().tipo);
                
                console.log("Login realizado para:", u);
                console.log("Tipo detectado:", snap.data().tipo);

                // REDIRECIONAMENTO COM RECARGA TOTAL
                if(snap.data().tipo === "admin") {
                    window.location.href = "./admin.html";
                } else {
                    window.location.href = "./loja.html";
                }
            } else { alert("Usuário ou senha inválidos!"); }
        } catch (error) { console.error("Erro no Login:", error); }
    };
</script>
