<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eskimó</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>

    <div class="bg-shape1"></div>
    <div class="bg-shape2"></div>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="logo-icon">🍨</div>
            <h1>Eskimó Sorvetes</h1>
            <p>Sistema de Pedidos e Logística</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="usuario" placeholder="Usuário / Login" required autocomplete="off">
                    <span class="input-icon">👤</span>
                </div>
                
                <div class="input-group">
                    <input type="password" id="senha" placeholder="Senha" required>
                    <span class="input-icon">🔒</span>
                </div>
                
                <button type="submit" class="btn-entrar" id="btnEntrar">Acessar Sistema</button>
            </form>
            
            <div id="msgErro">Usuário ou senha incorretos!</div>
            
            <div class="footer-text">&copy; 2026 Eskimó Faturamento Central</div>
        </div>
    </div>

    <script type="module" src="./js/index.js"></script>
</body>
</html>
