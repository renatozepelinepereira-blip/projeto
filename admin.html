<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Matriz - Eskimó</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: #f8f9fa; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e3000f; padding-bottom: 15px; margin-bottom: 25px; }
        h1, h2, h3 { color: #e3000f; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { border: 1px solid #eee; padding: 20px; border-radius: 8px; background: #fff; }
        input[type="text"], input[type="password"], input[type="file"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: #e3000f; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { background: #b3000c; }
        .btn-small { width: auto; padding: 6px 12px; font-size: 12px; margin: 0 5px; }
        .btn-edit { background: #007bff; } .btn-edit:hover { background: #0056b3; }
        .btn-del { background: #dc3545; } .btn-del:hover { background: #c82333; }
        ul { list-style: none; }
        li { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .checkbox-group { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; background: #f4f4f4; padding: 8px 12px; border-radius: 6px; }
        #modalEditar { display: none; background: #fff; border: 2px solid #e3000f; padding: 20px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Painel Administrativo</h1>
            <button onclick="localStorage.clear(); window.location.href='index.html'" style="width:auto; background:#444;">Sair</button>
        </header>

        <div class="grid">
            <div>
                <div class="card" style="margin-bottom: 20px;">
                    <h2>Importar Preços</h2>
                    <p style="font-size: 13px; color: #666; margin-bottom: 10px;"><b>NOVIDADE:</b> Agora você pode subir a planilha <b>.xlsx</b> direto do Excel! O nome do arquivo DEVE ser o login da loja (ex: <i>dourados.xlsx</i>).</p>
                    <input type="file" id="fileCsv" accept=".csv, .xlsx" multiple>
                    <button id="btnUpload" style="background: #28a745;">Processar e Salvar no Banco</button>
                </div>

                <div class="card">
                    <h2>Usuários Cadastrados</h2>
                    <button onclick="window.abrirNovoUsuario()" style="background: #17a2b8;">+ Novo Usuário</button>
                    <ul id="listaLojas"></ul>
                </div>
            </div>

            <div>
                <div class="card" id="modalEditar">
                    <h2 id="tituloForm">Editar Usuário</h2>
                    <input type="hidden" id="editId">
                    
                    <label>Login do Usuário:</label>
                    <input type="text" id="editLogin" placeholder="Ex: dourados" disabled>
                    
                    <label>Nome da Filial:</label>
                    <input type="text" id="editNome" placeholder="Nome da Filial">
                    
                    <label>Senha:</label>
                    <input type="text" id="editSenha" placeholder="Senha">
                    
                    <h3>Permissões do Sistema</h3>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="chkAdmin"> É Administrador</label>
                    </div>

                    <h3>Planilhas Visíveis para esta Loja</h3>
                    <div class="checkbox-group">
                        <label><input type="checkbox" id="chkSorvete"> Sorvetes</label>
                        <label><input type="checkbox" id="chkSeco"> Secos</label>
                        <label><input type="checkbox" id="chkBalde"> Baldes</label>
                    </div>

                    <button id="btnSalvarEdicao">Salvar Configurações</button>
                    <button onclick="document.getElementById('modalEditar').style.display='none'" style="background:#666;">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBA9gyn1dWpSoTD8VORiiPU4hUIEVG7DU8",
            authDomain: "sistema-pedidos-3f2c2.firebaseapp.com",
            projectId: "sistema-pedidos-3f2c2",
            storageBucket: "sistema-pedidos-3f2c2.firebasestorage.app",
            messagingSenderId: "669786014126",
            appId: "1:669786014126:web:d0da498633a145d56a883f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        if(localStorage.getItem('tipo') !== 'admin') { window.location.href = 'index.html'; }

        let usuariosData = {};

        async function carregarLojas() {
            const snap = await getDocs(collection(db, "usuarios"));
            const lista = document.getElementById('listaLojas');
            lista.innerHTML = '';
            usuariosData = {};
            
            snap.forEach(d => {
                usuariosData[d.id] = d.data();
                const isAdmin = d.data().tipo === 'admin' ? '<span style="color:red; font-size:10px; border:1px solid red; padding:2px; margin-left:5px;">ADMIN</span>' : '';
                lista.innerHTML += `<li>
                    <span><b>${d.id}</b> - ${d.data().nomeLoja} ${isAdmin}</span>
                    <div>
                        <button class="btn-small btn-edit" onclick="window.editar('${d.id}')">Editar</button>
                        <button class="btn-small btn-del" onclick="window.excluir('${d.id}')">X</button>
                    </div>
                </li>`;
            });
        }

        window.abrirNovoUsuario = () => {
            document.getElementById('tituloForm').innerText = "Novo Usuário";
            document.getElementById('editId').value = "NOVO";
            document.getElementById('editLogin').value = "";
            document.getElementById('editLogin').disabled = false;
            document.getElementById('editNome').value = "";
            document.getElementById('editSenha').value = "";
            document.getElementById('chkAdmin').checked = false;
            document.getElementById('chkSorvete').checked = true;
            document.getElementById('chkSeco').checked = false;
            document.getElementById('chkBalde').checked = false;
            document.getElementById('modalEditar').style.display = 'block';
        };

        window.editar = (id) => {
            const u = usuariosData[id];
            document.getElementById('tituloForm').innerText = "Editar Usuário: " + id;
            document.getElementById('editId').value = id;
            document.getElementById('editLogin').value = id;
            document.getElementById('editLogin').disabled = true; 
            document.getElementById('editNome').value = u.nomeLoja || "";
            document.getElementById('editSenha').value = u.senha || "";
            document.getElementById('chkAdmin').checked = u.tipo === 'admin';
            
            const planilhas = u.planilhas || { sorvete: true, seco: false, balde: false };
            document.getElementById('chkSorvete').checked = planilhas.sorvete;
            document.getElementById('chkSeco').checked = planilhas.seco;
            document.getElementById('chkBalde').checked = planilhas.balde;
            
            document.getElementById('modalEditar').style.display = 'block';
        };

        window.excluir = async (id) => { 
            if(confirm("Excluir usuário " + id + "?")) { 
                await deleteDoc(doc(db, "usuarios", id)); 
                carregarLojas(); 
            } 
        };

        document.getElementById('btnSalvarEdicao').onclick = async () => {
            const idMode = document.getElementById('editId').value;
            const login = document.getElementById('editLogin').value.toLowerCase().trim();
            if(!login) return alert("O login é obrigatório!");

            const dados = {
                senha: document.getElementById('editSenha').value,
                nomeLoja: document.getElementById('editNome').value,
                tipo: document.getElementById('chkAdmin').checked ? "admin" : "loja",
                planilhas: {
                    sorvete: document.getElementById('chkSorvete').checked,
                    seco: document.getElementById('chkSeco').checked,
                    balde: document.getElementById('chkBalde').checked
                }
            };

            await setDoc(doc(db, "usuarios", login), dados, { merge: true });
            alert("Usuário salvo com sucesso!");
            document.getElementById('modalEditar').style.display = 'none';
            carregarLojas();
        };

        // SUPER UPLOAD (Aceita Excel puro, limpa R$, vírgulas e espaços)
        document.getElementById('btnUpload').onclick = async () => {
            const files = document.getElementById('fileCsv').files;
            if(files.length === 0) return alert("Selecione os arquivos!");
            
            document.getElementById('btnUpload').innerText = "Processando... Aguarde";
            
            for(let f of files) {
                // Tira a extensão (.csv ou .xlsx) para descobrir o nome da loja
                const lojaId = f.name.replace(/\.[^/.]+$/, "").toLowerCase().trim();
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    const rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
                    
                    let precos = {};
                    let count = 0;

                    for(let row of rawData) {
                        // Limpa os espaços dos cabeçalhos
                        let cleanRow = {};
                        for(let key in row) { cleanRow[key.toString().trim().toUpperCase()] = row[key]; }

                        let cod = cleanRow['CODIGO'] || cleanRow['CÓDIGO'];
                        let prod = cleanRow['PRODUTO'];
                        let eng = parseInt(cleanRow['ENGRADADO']) || 1;
                        let cat = cleanRow['CATEGORIA'] ? String(cleanRow['CATEGORIA']).toUpperCase().trim() : 'SORVETE';
                        
                        // LIMPEZA EXTREMA DO PREÇO
                        let precoVal = cleanRow['PRECO'] || cleanRow['PREÇO'];
                        let preco = 0;
                        
                        if(typeof precoVal === 'number') {
                            preco = precoVal;
                        } else {
                            let precoStr = String(precoVal || "0");
                            if(precoStr.includes(',')) {
                                // Tira o R$, tira espaço, tira pontos de milhar e troca vírgula por ponto
                                precoStr = precoStr.replace(/R\$/gi, '').replace(/\s/g, '').replace(/\./g, '').replace(',', '.');
                            } else {
                                // Se já for formato americano, só tira o R$ e espaços
                                precoStr = precoStr.replace(/R\$/gi, '').replace(/\s/g, '');
                            }
                            preco = parseFloat(precoStr);
                        }

                        if(cod && prod && !isNaN(preco) && preco > 0) {
                            precos[cod.toString()] = preco;
                            await setDoc(doc(db, "produtos", cod.toString()), {
                                codigo: cod.toString(), descricao: prod, engradado: eng, categoria: cat
                            }, { merge: true });
                            count++;
                        }
                    }
                    
                    if(count > 0) {
                        await setDoc(doc(db, "precos", lojaId), precos);
                        alert(`SUCESSO! ${count} produtos salvos para o usuário "${lojaId}".`);
                    } else {
                        alert(`⚠️ Nenhum produto salvo. Verifique se as colunas estão certas no arquivo ${f.name}`);
                    }
                    
                    document.getElementById('btnUpload').innerText = "Processar e Salvar no Banco";
                };
                reader.readAsArrayBuffer(f);
            }
        };

        carregarLojas();
    </script>
</body>
</html>
