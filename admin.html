<div id="sec-precos" class="secao">
    <h2 class="section-title">Gestão de Tabelas e Vínculos</h2>
    <div class="grid-2">
        <div class="card-panel">
            <h3>1. Importar Excel de Preços</h3>
            <label>Nome da Tabela (Ex: TF, PM01)</label>
            <input type="text" id="nomeTabelaPreco" placeholder="Nome da Tabela">
            <input type="file" id="fileCsvPrecos" accept=".xlsx, .csv">
            <button onclick="window.importarTabelaPrecos()" class="btn-primario" style="width:100%;">⚡ Importar Tabela</button>
        </div>

        <div class="card-panel">
            <h3>2. Vincular Tabela às Filiais</h3>
            <label>Selecione a Tabela Destino</label>
            <select id="selectTabelaAssociar" style="margin-bottom: 10px; border: 2px solid #e3000f;"></select>
            
            <div style="margin: 10px 0; background: #f8f9fa; padding: 10px; border-radius: 8px;">
                <label>🔍 Pesquisar Filial (Nome ou Número)</label>
                <input type="text" id="buscaFilialVinculo" placeholder="Ex: 003 ou Canoas..." oninput="window.filtrarLojasChecklist()" style="margin-bottom: 5px;">
                
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button onclick="window.marcarTodosLojas(true)" class="btn-small" style="background:#6c757d; width:auto; padding:0 10px; font-size:11px;">Marcar Todos</button>
                    <button onclick="window.marcarTodosLojas(false)" class="btn-small" style="background:#6c757d; width:auto; padding:0 10px; font-size:11px;">Desmarcar Todos</button>
                </div>

                <div id="listaLojasChecklist" style="max-height: 250px; overflow-y: auto; background: white; border: 1px solid #ddd; padding: 10px; border-radius: 5px;">
                    </div>
            </div>

            <button onclick="window.vincularTabelaEmMassa()" class="btn-sucesso" style="width:100%; padding: 15px; font-size: 16px;">💾 Aplicar Tabela às Selecionadas</button>
        </div>
    </div>
</div>
