<div id="sec-dashboard" class="secao active">
    <h2 class="section-title">Visão Geral</h2>
    
    <div class="dash-cards">
        <div class="card-stat">
            <h3>Lojas Ativas</h3>
            <div class="valor" id="dashLojas">0</div>
        </div>
        <div class="card-stat" style="border-left-color: #0056b3;">
            <h3>Produtos Catálogo</h3>
            <div class="valor" id="dashProdutos">0</div>
        </div>
        
        <div class="card-stat" style="border-left-color: #28a745;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <h3>Planilhas Geradas</h3>
                <input type="date" id="filtroDataHist" onchange="window.carregarDashboard()" style="width: auto; padding: 2px; font-size: 11px; margin: 0; border: none; background: #f0f7f0; cursor: pointer;">
            </div>
            <div class="valor" id="dashPlanilhas">0</div>
        </div>
    </div>

    <div class="card-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; color: #444;">Últimas Atividades</h3>
            <button onclick="window.toggleTabelaHistorico()" class="btn-small" style="background: #6c757d; width: auto; padding: 0 10px; font-size: 12px;" id="btnToggleHist">👁️ Esconder</button>
        </div>
        
        <div id="wrapperHistorico">
            <input type="text" id="pesquisaLogAdmin" placeholder="🔍 Pesquisar no histórico..." style="margin-bottom: 15px;">
            <div style="max-height: 400px; overflow-y: auto;">
                <table id="tabelaHistorico">
                    <thead>
                        <tr><th>Data / Hora</th><th>Loja</th><th>Ação</th><th>Destino</th><th>Ações</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
